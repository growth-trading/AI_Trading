{% extends 'base.html' %}
{% block title %}AI Trading Bot — AITrading{% endblock %}

{% block content %}
<div class="trading-page">
  <!-- Chart Card -->
  <div class="trading-chart-card">

    <!-- Toolbar -->
    <div class="tv-toolbar">
      <!-- Symbol Groups -->
      <div class="tv-symbol-groups">
        <div class="tv-symbol-group">
          <span class="tv-group-label">Metals</span>
          <button class="tv-symbol-btn active" data-symbol="OANDA:XAUUSD">XAUUSD</button>
          <button class="tv-symbol-btn" data-symbol="OANDA:XAGUSD">XAGUSD</button>
        </div>
        <div class="tv-divider"></div>
        <div class="tv-symbol-group">
          <span class="tv-group-label">Forex</span>
          <button class="tv-symbol-btn" data-symbol="OANDA:EURUSD">EURUSD</button>
          <button class="tv-symbol-btn" data-symbol="OANDA:GBPUSD">GBPUSD</button>
          <button class="tv-symbol-btn" data-symbol="OANDA:USDJPY">USDJPY</button>
        </div>
        <div class="tv-divider"></div>
        <div class="tv-symbol-group">
          <span class="tv-group-label">Crypto</span>
          <button class="tv-symbol-btn" data-symbol="BINANCE:BTCUSDT">BTC</button>
          <button class="tv-symbol-btn" data-symbol="BINANCE:ETHUSDT">ETH</button>
          <button class="tv-symbol-btn" data-symbol="BINANCE:SOLUSDT">SOL</button>
        </div>
        <div class="tv-divider"></div>
        <div class="tv-symbol-group">
          <span class="tv-group-label">Stocks</span>
          <button class="tv-symbol-btn" data-symbol="NASDAQ:AAPL">AAPL</button>
          <button class="tv-symbol-btn" data-symbol="NASDAQ:TSLA">TSLA</button>
        </div>
      </div>

    </div>

    <!-- Live Bar -->
    <div class="tv-live-bar">
      <span class="tv-live-dot"></span>
      <span class="text-muted small" data-i18n="trad.chart.realtime">Dữ liệu thời gian thực từ TradingView</span>
    </div>

    <!-- TradingView Widget -->
    <div class="tradingview-widget-container">
      <div id="tradingview_chart"></div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
(function () {
  var currentSymbol = 'OANDA:XAUUSD';

  function loadChart(symbol) {
    currentSymbol = symbol;
    document.getElementById('tradingview_chart').innerHTML = '';

    new TradingView.widget({
      symbol: symbol,
      interval: 'H1',
      theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark',
      style: '1',
      locale: document.documentElement.getAttribute('data-lang') === 'en' ? 'en' : 'vi_VN',
      container_id: 'tradingview_chart',
      width: '100%',
      height: 600,
      hide_side_toolbar: false,
      allow_symbol_change: true,
      withdateranges: true,
      save_image: false,
      toolbar_bg: '#111827',
    });

    document.querySelectorAll('.tv-symbol-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.symbol === symbol);
    });
  }

  document.querySelectorAll('.tv-symbol-btn').forEach(function (btn) {
    btn.addEventListener('click', function () { loadChart(btn.dataset.symbol); });
  });

loadChart(currentSymbol);
})();
</script>
{% endblock %}
