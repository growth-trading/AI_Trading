# Nginx config cho RichAITrading — Windows VPS
# Đặt file này tại: C:\nginx\conf\nginx.conf  (thay thế file mặc định)

worker_processes  2;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Tăng giới hạn upload (ảnh chart)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream django {
        server 127.0.0.1:8000;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name richaitrading.com www.richaitrading.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name richaitrading.com www.richaitrading.com;

        ssl_certificate     C:/ssl/richaitrading.com-chain.pem;
        ssl_certificate_key C:/ssl/richaitrading.com-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Static files — phục vụ trực tiếp, không qua Django
        location /static/ {
            alias C:/sites/AI_Trading/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias C:/sites/AI_Trading/media/;
            expires 7d;
        }

        # Tất cả request khác → Waitress
        location / {
            proxy_pass http://django;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
}
