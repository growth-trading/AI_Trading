# Nginx config cho RichAITrading — Windows VPS
# Đặt file này tại: C:\nginx\conf\nginx.conf  (thay thế file mặc định)
# Hoặc include vào nginx.conf: include conf/sites/aitrading.conf;

worker_processes  2;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Tăng giới hạn upload (ảnh chart)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream django {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        # Static files — phục vụ trực tiếp, không qua Django
        location /static/ {
            alias C:/path/to/AI_Trading/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias C:/path/to/AI_Trading/media/;
            expires 7d;
        }

        # Tất cả request khác → Waitress
        location / {
            proxy_pass http://django;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
}
